name: Publish

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - release

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Preflight validation (build + dry-run publish)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'preflight' }}
        run: ./gradlew clean build publishAggregationToCentralPortal --dry-run

      - name: Publish to Maven Central
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release') }}
        run: ./gradlew publishAggregationToCentralPortal
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
