name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

      - name: Verify LICENSE and NOTICE in JARs
        run: |
          FAILED=0
          for jar in $(find . -path '*/build/libs/*.jar' ! -name '*-javadoc.jar' ! -name '*-sources.jar'); do
            for entry in META-INF/LICENSE META-INF/NOTICE; do
              if ! jar tf "$jar" | grep -qF "$entry"; then
                echo "MISSING $entry in $jar"
                FAILED=1
              fi
            done
          done
          if [ $FAILED -ne 0 ]; then
            echo "Compliance check failed: LICENSE or NOTICE missing from one or more JARs"
            exit 1
          fi
          echo "Compliance check passed"

      - name: Publish Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: JUnit Tests
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
